version: "3.8"

# ---------------------------------------------------------
# NETWORKS
# ---------------------------------------------------------
networks:
  home_lab_net:
    name: home_lab_net
    driver: bridge

# ---------------------------------------------------------
# SERVICES
# ---------------------------------------------------------
services:

  # 1. MANAGEMENT & ACCESS
  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./config/portainer:/data
    ports:
      - 9000:9000
    networks:
      - home_lab_net

  tailscale:
    image: tailscale/tailscale:latest
    container_name: tailscale
    hostname: app-server
    restart: unless-stopped
    network_mode: host # Allows Tailscale to route to your whole network
    volumes:
      - ./config/tailscale:/var/lib/tailscale
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - net_admin
      - sys_module

  # 2. SECURE DOWNLOAD PIPELINE
  gluetun:
    image: qmcgaw/gluetun:latest
    container_name: gluetun
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    ports:
      - 8080:8080 # qBittorrent Web UI
      - 6881:6881 # qBittorrent TCP
      - 6881:6881/udp # qBittorrent UDP
    environment:
      - VPN_SERVICE_PROVIDER=custom # Change to your VPN provider (e.g., protonvpn, mullvad)
      - OPENVPN_USER=${VPN_USER}
      - OPENVPN_PASSWORD=${VPN_PASS}
    volumes:
      - ./config/gluetun:/gluetun
    networks:
      - home_lab_net

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    restart: unless-stopped
    network_mode: "service:gluetun" # Forces all traffic through the VPN container
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TIMEZONE}
      - WEBUI_PORT=8080
    volumes:
      - ./config/qbittorrent:/config
      - /path/to/your/nas/downloads:/downloads # Update this path

  # 3. THE *ARR AUTOMATION STACK
  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    restart: unless-stopped
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TIMEZONE}
    volumes:
      - ./config/prowlarr:/config
    ports:
      - 9696:9696
    networks:
      - home_lab_net

  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    restart: unless-stopped
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TIMEZONE}
    volumes:
      - ./config/radarr:/config
      - /path/to/your/nas/data:/data # Update this path to your NAS mount
    ports:
      - 7878:7878
    networks:
      - home_lab_net

  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    restart: unless-stopped
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TIMEZONE}
    volumes:
      - ./config/sonarr:/config
      - /path/to/your/nas/data:/data # Update this path
    ports:
      - 8989:8989
    networks:
      - home_lab_net

  lidarr:
    image: lscr.io/linuxserver/lidarr:latest
    container_name: lidarr
    restart: unless-stopped
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TIMEZONE}
    volumes:
      - ./config/lidarr:/config
      - /path/to/your/nas/data:/data # Update this path
    ports:
      - 8686:8686
    networks:
      - home_lab_net

  # 4. MEDIA STREAMING (WITH 2070 SUPER PASSTHROUGH)
  jellyfin:
    image: lscr.io/linuxserver/jellyfin:latest
    container_name: jellyfin
    restart: unless-stopped
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TIMEZONE}
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,video,utility
    volumes:
      - ./config/jellyfin:/config
      - /path/to/your/nas/data/media:/data/media # Update this path
    ports:
      - 8096:8096
    networks:
      - home_lab_net
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]